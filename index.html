  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
    }

    body {
      min-height: 100vh;
      position: relative;
    }

    .title {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      white-space: nowrap;
    }

    .title .line1 {
      display: block;
      font-size: 5.8rem;
    }

    .title .line2 {
      display: block;
      font-size: 5.8rem;
      margin-top: 0.3em;
    }

    .poem-wrap {
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .poem {
      font-size: 0,78rem;
      line-height: 1.8;
      color: #000;
    }

    .criacao {
      position: absolute;
       bottom: 304px;
      left: 30%;
      font-size: 4rem;
      line-height: 1.8;
      color: #000;
    }

    .poem span {
      display: block;
    }

.wof {
  opacity: 0%;
  display: none;
}

  </style>
</head>
